<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENKEU PORTALDATA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #0b0f19;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .app-header {
            height: 45px; background-color: #0f172a; border-bottom: 1px solid #1e293b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box;
        }
        .brand { display: flex; align-items: center; gap: 10px; color: #38bdf8; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .status-badge { display: flex; align-items: center; gap: 8px; background-color: #1e293b; padding: 4px 12px; border-radius: 20px; color: #94a3b8; font-size: 11px; border: 1px solid #334155; }
        .status-dot { width: 7px; height: 7px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        .iframe-container { position: absolute; left: 0; bottom: 0; right: 0; width: 100%; top: 45px; height: calc(100% - 45px); border: none; z-index: 9999; background-color: #0b0f19; }
        iframe { width: 100%; height: 100%; border: none; display: block; background-color: transparent; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <i class="bi bi-shield-check"></i>
      <span>MANAJEMEN DATA</span>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div> Secure Google Cloud Connection
    </div>
  </header>

  <div class="iframe-container">
    <iframe 
        src="https://script.google.com/macros/s/AKfycbyjZWaiTPxvs6q0Oe7xTzc4Q9mqa5AAe51Q4WpkssHrX27gd9lAeSSOIWdeogvkT2ka3A/exec" 
        id="Renkeu-frame"
        name="Renkeu-frame"
        allow="camera; geolocation; microphone; clipboard-write; javascript"
        title="Renkeu-Portaldata">
    </iframe>
  </div>

</body>
</html>
