<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENKEU PORTALDATA</title>
    <style>
        /* Reset default margin & padding */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            
            /* MENGGUNAKAN WARNA ASLI BACKGROUND PORTAL ANDA */
            background-color: #0b0f19 !important; 
            
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Container pembungkus utama */
        .iframe-container {
            position: absolute;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            
            /* MEMBERIKAN JARAK ATAS */
            top: 25px; /* Anda bisa ubah ke 10px atau 12px jika dirasa terlalu renggang */
            height: calc(100% - 25px); 
            
            border: none;
            z-index: 9999;
            
            /* Memastikan latar belakang container juga mengikuti warna pekat */
            background-color: #0b0f19 !important;
        }

        /* Mengatur Iframe agar penuh di dalam container */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background-color: transparent; /* Membuat iframe transparan agar background menyatu */
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxiSvvz4xwnJzh4WVgyZu3OthGzaf2uZJ0ayKY6Y39RMd-QKz7Ltgw_MMtI3soYNlNAkg/exec" 
            id="renkeu-frame"
            name="renkeu-frame"
            allow="camera; geolocation; microphone; clipboard-write; javascript"
            title="RENKEU_PORTALDATA">
        </iframe>
    </div>

    <script>
        console.log("Wrapper GitHub dengan penyelarasan warna latar belakang sukses diterapkan.");
    </script>
</body>
</html>
